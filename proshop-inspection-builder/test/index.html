<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ProShop Inspection Builder — Tests</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e8e8e8; padding: 20px; }
    h1 { color: #4a9eff; }
    h2 { color: #a0a8c0; margin-top: 20px; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    .test { padding: 4px 0; padding-left: 16px; }
    .summary { margin-top: 20px; padding: 12px; border: 1px solid #2a3354; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>ProShop Inspection Builder — Test Suite</h1>
  <div id="results"></div>
  <div id="summary" class="summary"></div>

  <!-- Load modules in dependency order -->
  <script src="../js/mathEngine.js"></script>
  <script src="../js/parser.js"></script>
  <script src="../js/dataModel.js"></script>

  <!-- Load test data and test suites -->
  <script src="testData.js"></script>
  <script src="parser.test.js"></script>
  <script src="mathEngine.test.js"></script>

  <!-- Run tests -->
  <script>
    var results = document.getElementById('results');
    var summary = document.getElementById('summary');

    var totalPass = 0;
    var totalFail = 0;

    function log(html) {
      results.innerHTML += html;
    }

    function runSuite(name, testFn) {
      log('<h2>' + name + '</h2>');
      var result = testFn(log);
      totalPass += result.passed;
      totalFail += result.failed;
    }

    runSuite('Parser Tests', TEST.runParserTests);
    runSuite('Math Engine Tests', TEST.runMathTests);

    var color = totalFail === 0 ? 'pass' : 'fail';
    summary.innerHTML = '<span class="' + color + '">' +
      (totalPass + totalFail) + ' tests: ' + totalPass + ' passed, ' + totalFail + ' failed' +
    '</span>';
  </script>
</body>
</html>
